services:
  - type: web
    name: mailmind-api
    runtime: python
    buildCommand: pip install -r email-assistant/backend/requirements.txt
    startCommand: cd email-assistant/backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.8"
      - key: FLASK_PORT
        value: "10000"
      - key: SCHEDULER_INTERVAL_MINUTES
        value: "30"
      - key: MAX_EMAILS_PER_FETCH
        value: "0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false